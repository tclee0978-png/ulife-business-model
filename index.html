<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Life｜實體店舖 AI 品牌升級</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #fff; color: #000; overflow-x: hidden; }
        
        /* 核心修正：手機優先遮罩 - 確保文字在白色區域，不切臉 */
        .mobile-mask {
            background: linear-gradient(
                to right,
                rgba(255,255,255,1) 0%,
                rgba(255,255,255,0.9) 40%,
                rgba(255,255,255,0) 100%
            );
        }

        @media (min-width: 768px) {
            .mobile-mask {
                background: linear-gradient(to right, #fff 30%, transparent 100%);
            }
        }

        /* 人物位置修正：手機版 object-position 65% 保護五官 */
        .hero-img {
            object-fit: cover;
            object-position: 65% center;
        }
        
        @media (min-width: 1024px) {
            .hero-img { object-position: right center; }
        }

        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card { background: #fafafa; border: 1px solid #f0f0f0; transition: all 0.4s; }
        .glass-card:hover { transform: translateY(-10px); border-color: #d4af37; }
    </style>
</head>
<body>

    <!-- 導航欄 -->
    <nav class="fixed w-full z-50 px-6 py-4 flex justify-between items-center bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="text-xl font-black tracking-tighter">U-Life <span class="font-light">SYSTEM</span></div>
        <div class="flex gap-4">
            <button onclick="window.open('https://line.me', '_blank')" class="bg-black text-white px-5 py-2 rounded-full text-[10px] font-bold tracking-widest uppercase">Contact</button>
        </div>
    </nav>

    <!-- 1. Hero Section: 手機優先設計 -->
    <section class="relative min-h-screen w-full flex items-center">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=1976&auto=format&fit=crop" 
                 class="hero-img w-full h-full grayscale opacity-40 md:opacity-100" alt="核心形象">
            <div class="absolute inset-0 mobile-mask z-10"></div>
        </div>

        <div class="relative z-20 container mx-auto px-6">
            <div class="max-w-4xl">
                <p class="text-[10px] font-black tracking-[0.4em] text-gray-400 mb-4 uppercase">U-LIFE SYSTEM / 2026</p>
                <h1 class="text-5xl leading-[0.95] font-black tracking-tighter md:text-[110px] mb-6">
                    實體店舖<br><span class="gold-gradient">AI 品牌升級</span>
                </h1>
                <p class="text-gray-500 text-sm md:text-lg max-w-sm mb-10 leading-relaxed font-medium">
                    幫店家建立真正會成交的 AI 品牌。<br>整合專利健康科技，打造獲利閉環。
                </p>
                <div class="flex flex-col md:flex-row gap-6 items-start">
                    <button onclick="window.open('https://line.me', '_blank')" class="bg-black text-white px-10 py-5 text-lg font-black tracking-widest shadow-2xl">預約諮詢</button>
                    <div class="flex gap-6 items-center pt-4 md:pt-0">
                        <a href="https://www.facebook.com/share/1DcHC92W6p/" target="_blank" class="text-2xl text-gray-400 hover:text-black transition"><i class="fa-brands fa-facebook"></i></a>
                        <a href="https://portaly.cc/Peggychen1112" target="_blank" class="text-2xl text-gray-400 hover:text-black transition"><i class="fa-brands fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 2. 品牌願景：針對美業店長與老師 -->
    <section id="vision" class="py-24 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-10 rounded-[2rem]">
                <h3 class="text-xl font-bold mb-4">保護老師雙手</h3>
                <p class="text-gray-500 text-sm leading-relaxed">透過熱導技術降低 70% 體能消耗，讓專業價值不再受限於體力。</p>
            </div>
            <div class="glass-card p-10 rounded-[2rem]">
                <h3 class="text-xl font-bold mb-4">解決缺工痛點</h3>
                <p class="text-gray-500 text-sm leading-relaxed">標準化操作流程，降低技術門檻，讓人才管理不再成為擴張的阻礙。</p>
            </div>
            <div class="glass-card p-10 rounded-[2rem]">
                <h3 class="text-xl font-bold mb-4">AI 招商閉環</h3>
                <p class="text-gray-500 text-sm leading-relaxed">利用 AI 系統自動化產出高轉化內容，為您的店鋪建立 24 小時運行的獲利機器。</p>
            </div>
        </div>
    </section>

    <!-- 3. 科技矩陣 -->
    <section class="py-20 bg-gray-50 border-y border-gray-100">
        <div class="max-w-5xl mx-auto px-6 grid grid-cols-2 md:grid-cols-5 gap-8 text-center">
            <div><i class="fa-solid fa-sun text-2xl text-gray-300 mb-2"></i><p class="text-[10px] font-bold text-gray-400 uppercase">遠紅外線</p></div>
            <div><i class="fa-solid fa-wind text-2xl text-gray-300 mb-2"></i><p class="text-[10px] font-bold text-gray-400 uppercase">負離子</p></div>
            <div><i class="fa-solid fa-brain text-2xl text-gray-300 mb-2"></i><p class="text-[10px] font-bold text-gray-400 uppercase">AI 科技</p></div>
            <div><i class="fa-solid fa-house-medical text-2xl text-gray-300 mb-2"></i><p class="text-[10px] font-bold text-gray-400 uppercase">健康生活</p></div>
            <div><i class="fa-solid fa-plug-glow text-2xl text-gray-300 mb-2"></i><p class="text-[10px] font-bold text-gray-400 uppercase">熱導設備</p></div>
        </div>
    </section>

    <!-- 4. 總監結尾 -->
    <section class="py-24 px-6 text-center">
        <h2 class="text-3xl font-black mb-8 italic">「不賣機器，我們傳承的是獲利模組。」</h2>
        <button onclick="window.open('https://line.me', '_blank')" class="bg-black text-white px-12 py-5 rounded-full text-xl font-black tracking-widest shadow-xl">一對一對接總監</button>
    </section>

    <footer class="py-12 text-center text-gray-400 text-[10px] tracking-[0.3em] uppercase border-t border-gray-100">
        &copy; 2026 U-LIFE HEALTH SYSTEM.
    </footer>

</body>
</html>
