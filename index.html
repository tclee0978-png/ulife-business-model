<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Life｜實體店舖 AI 品牌升級</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #fff; color: #000; overflow-x: hidden; }
        
        /* 核心修正：手機版遮罩 - 讓字體在左側呼吸 */
        .mobile-mask {
            background: linear-gradient(
                to right,
                rgba(255,255,255,0.98) 0%,
                rgba(255,255,255,0.85) 45%,
                rgba(255,255,255,0.1) 100%
            );
        }

        /* 桌機版維持原有高級漸層 */
        @media (min-width: 768px) {
            .mobile-mask {
                background: linear-gradient(to right, #fff 35%, transparent 100%);
            }
        }

        /* 人物位置修正：讓出空間給文字 */
        .hero-img {
            object-fit: cover;
            object-position: 65% center; /* 手機版人物往右移，保護臉部 */
        }
        
        @media (min-width: 1024px) {
            .hero-img { object-position: right center; }
        }

        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <!-- 導航欄 -->
    <nav class="fixed w-full z-50 px-6 py-4 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="text-xl font-black tracking-tighter">U-Life <span class="font-light">SYSTEM</span></div>
        <button class="bg-black text-white px-5 py-2 rounded-full text-[10px] font-bold tracking-widest uppercase">Contact</button>
    </nav>

    <!-- Hero Section: 重新定義的結構 -->
    <section class="relative min-h-screen w-full flex items-center overflow-hidden">
        
        <!-- 背景人物：淡化為氛圍主角 -->
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=1976&auto=format&fit=crop" 
                 class="hero-img w-full h-full grayscale opacity-60 md:opacity-100" alt="核心形象">
            <div class="absolute inset-0 mobile-mask z-10"></div>
        </div>

        <!-- 內容層：文字與按鈕提前 -->
        <div class="relative z-20 container mx-auto px-6 md:px-12">
            <div class="max-w-4xl">
                <!-- 第一層：小標 -->
                <p class="text-[10px] md:text-xs font-black tracking-[0.4em] text-gray-400 mb-4 uppercase">
                    U-LIFE SYSTEM / 2026
                </p>

                <!-- 第二層：縮短的主標，解決切字問題 -->
                <h1 class="text-5xl leading-[0.9] font-black tracking-tighter md:text-[110px] mb-6">
                    實體店舖<br>
                    <span class="gold-gradient">AI 品牌升級</span>
                </h1>

                <!-- 第三層：精簡文案，保留呼吸感 -->
                <p class="text-gray-500 text-sm md:text-lg max-w-md mb-10 leading-relaxed font-medium">
                    幫店家建立真正會成交的 AI 品牌。<br class="hidden md:block">
                    整合專利健康科技，打造獲利閉環。
                </p>

                <!-- 第四層：按鈕提前，不再掉到底部 -->
                <div class="flex flex-col md:flex-row gap-4 items-start">
                    <button class="bg-black text-white px-10 py-5 text-lg font-black tracking-widest hover:bg-gray-800 transition shadow-2xl">
                        預約諮詢
                    </button>
                    <div class="flex items-center gap-6 mt-6 md:mt-0 md:ml-8">
                        <a href="#" class="text-xl text-gray-400 hover:text-black transition"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class="text-xl text-gray-400 hover:text-black transition"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class="text-xl text-gray-400 hover:text-black transition"><i class="fa-solid fa-link"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
