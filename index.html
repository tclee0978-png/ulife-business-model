<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Life 系統 | AI 客製化文案無限生成器</title>
<style>
    /* 沿用 Apple 經典純白極簡風 */
    :root{
      --bg: #ffffff;
      --card-bg: #f5f5f7;
      --text: #1d1d1f;
      --muted: #86868b;
      --line: rgba(0, 0, 0, 0.08);
      --blue: #0066cc;
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
      display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
    }
    .container {
      background: var(--card-bg); border: 1px solid var(--line);
      border-radius: 28px; padding: 40px; width: 100%; max-width: 540px; text-align: center;
    }
    h1 { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    p.subtitle { color: var(--muted); margin-bottom: 25px; font-size: 13px; }
    
    /* 金鑰配置輸入框（讓買家自己填或你幫他填，保護你的錢包） */
    .api-config { margin-bottom: 20px; text-align: left; }
    .api-config label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    .api-config input {
      width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--line);
      background: #fff; font-size: 13px; color: var(--text);
    }

    .role-selector { display: flex; background: rgba(0,0,0,0.05); border-radius: 50px; padding: 4px; margin-bottom: 25px; }
    .role-btn { flex: 1; background: transparent; color: var(--muted); border: none; padding: 10px; font-size: 14px; font-weight: 600; border-radius: 50px; cursor: pointer; }
    .role-btn.active { background: #fff; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    
    .btn-generate {
      background: #1d1d1f; color: #fff; border: none; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 50px; cursor: pointer; width: 100%; transition: background 0.2s;
    }
    .btn-generate:hover { background: var(--blue); }
    .btn-generate:disabled { background: var(--muted); cursor: not-allowed; }
    
    .output-box {
      background: #fff; border-radius: 14px; padding: 20px; margin-top: 25px; min-height: 120px;
      text-align: left; white-space: pre-line; line-height: 1.6; border: 1px solid var(--line); font-size: 15px; display: none;
    }
    .btn-copy {
      background: transparent; color: var(--blue); border: none; padding: 10px; font-size: 14px; cursor: pointer; margin-top: 10px; display: none;
    }
    .btn-copy:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
    <h1>U-Life 健康事業系統</h1>
    <p class="subtitle">🚀 真正 AI 腦波對接 — 無限爆款文案生成器</p>
    
    <!-- API 金鑰輸入區塊 -->
    <div class="api-config">
        <label>輸入 Gemini API 金鑰 (系統會安全儲存在您的瀏覽器中)：</label>
        <input type="password" id="apiKey" placeholder="AIZAcy..." value="">
    </div>
    
    <div class="role-selector">
        <button class="role-btn active" id="btn-coach" onclick="setRole('coach')">🏋️ 運動教練</button>
        <button class="role-btn" id="btn-shop" onclick="setRole('shop')">💈 蒸足店長</button>
    </div>
    
    <button class="btn-generate" id="mainBtn" onclick="generateTrueAI()">🎯 點擊按鈕，現場編寫全新文案</button>
    
    <div class="output-box" id="outputBox"></div>
    <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">📋 一鍵複製文案</button>
</div>

<script>
let currentRole = 'coach';

// 自動從瀏覽器讀取上次存過的金鑰
document.getElementById('apiKey').value = localStorage.getItem('ulife_gemini_key') || '';

function setRole(role) {
    currentRole = role;
    document.getElementById('btn-coach').classList.remove('active');
    document.getElementById('btn-shop').classList.remove('active');
    document.getElementById(role === 'coach' ? 'btn-coach' : 'btn-shop').classList.add('active');
}

async function generateTrueAI() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
        alert('請先輸入有效的 Gemini API 金鑰！');
        return;
    }
    // 儲存金鑰，下次打開不用重複輸入
    localStorage.setItem('ulife_gemini_key', apiKey);

    const mainBtn = document.getElementById('mainBtn');
    const outputBox = document.getElementById('outputBox');
    const copyBtn = document.getElementById('copyBtn');

    mainBtn.disabled = true;
    mainBtn.innerText = '⚡ AI 正在大腦思考中...請稍候';
    outputBox.style.display = 'block';
    outputBox.innerText = '正在調用底層神經網絡，為您撰寫全新不重複文案...';

    // 依據選擇的身分，發送不同的 Master Prompt 齒輪給後台 AI
    let prompt = "";
    if (currentRole === 'coach') {
        prompt = "你現在是 U-Life 系統的頂級明星運動教練。請現場撰寫一篇全新、完全不重複的社群招生引流文案。內容要針對久坐上班族、產後媽媽或壓力大者，精準切入蹦蹦跳床、TRX 懸吊或階梯有氧的其中一項課程，主打解壓、快樂燃脂。結尾必須帶有強烈的行動呼籲（CTA），例如引導私訊扣關鍵字領取免費體驗券。文字要像真人寫的，拒絕公式化的垃圾，不要有過多表情符號，直接給我文案成果，不需要任何前言或解釋。";
    } else {
        prompt = "你現在是 U-Life 系統的專業健康管理蒸足店長。請現場撰寫一篇全新、完全不重複的店鋪引流文案。內容要切中現代人體內濕氣重、手腳冰冷、失眠或慢性疲勞的日常痛點，深度包裝 U-Life 遠紅外線負離子蒸足與熱導筋膜舒緩技術。文案要具備極強的體感共鳴與信任感。結尾必須包含引流鉤子，例如限時釋出3個名額、私訊預約體驗。直接給我文案內容，不要有任何多餘的解釋或客套話。";
    }

    try {
        // 直連 Google 官方最新 Gemini 1.5 Flash 運算引擎
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();
        const aiResponse = data.candidates[0].content.parts[0].text;
        
        outputBox.innerText = aiResponse;
        copyBtn.style.display = 'inline-block';
    } catch (error) {
        outputBox.innerText = '運算發生錯誤，請檢查您的 API 金鑰是否輸入正確，或網路是否連通。';
        console.error(error);
    } finally {
        mainBtn.disabled = false;
        mainBtn.innerText = '🎯 點擊按鈕，現場編寫全新文案';
    }
}

function copyToClipboard() {
    const text = document.getElementById('outputBox').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert('真正的 AI 爆款文案已複製！趕快去發文吧 🚀');
    });
}
</script>

</body>
</html>
