<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #ffffff; color: #1a202c; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* 核心科技感背景：模擬圖2的科技都市與能量場 */
        .hero-visual-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 50%, rgba(66, 133, 244, 0.05) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* 碳纖維底紋增加細節 */
        }

        /* 側邊裝飾圖層：避開中間文字 */
        .side-decoration-left {
            position: absolute;
            left: -5%;
            top: 20%;
            width: 30%;
            height: 60%;
            background: url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1000') no-repeat center;
            background-size: cover;
            mask-image: linear-gradient(to right, black 30%, transparent);
            -webkit-mask-image: linear-gradient(to right, black 30%, transparent);
            opacity: 0.15;
            filter: grayscale(100%);
        }

        .side-decoration-right {
            position: absolute;
            right: -5%;
            top: 20%;
            width: 30%;
            height: 60%;
            background: url('https://images.unsplash.com/photo-1576091160550-2173dad99901?auto=format&fit=crop&q=80&w=1000') no-repeat center;
            background-size: cover;
            mask-image: linear-gradient(to left, black 30%, transparent);
            -webkit-mask-image: linear-gradient(to left, black 30%, transparent);
            opacity: 0.15;
            filter: grayscale(100%);
        }

        /* 文字陰影與樣式校正 */
        h1 { letter-spacing: -0.05em !important; line-height: 1.1; text-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .gold-gradient { background: linear-gradient(135deg, #b8860b 0%, #d4af37 50%, #b8860b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn-gold { 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: #ffffff; font-weight: 900; 
            transition: all 0.3s;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
        }
        .btn-gold:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* 彩色品牌 ICON */
        .icon-fb { color: #1877F2; }
        .icon-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-threads { color: #000000; }
        .social-link { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .social-link:hover { transform: scale(1.3) rotate(5deg); }

        /* 能量環動畫 */
        .energy-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            z-index: -2;
            animation: spin 20s linear infinite;
        }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
