<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Life 系統 | AI 客製化文案無限生成器</title>
<style>
    /* Apple 經典純白極簡美學 */
    :root{
      --bg: #ffffff;
      --card-bg: #f5f5f7;
      --text: #1d1d1f;
      --muted: #86868b;
      --line: rgba(0, 0, 0, 0.08);
      --blue: #0066cc;
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans TC", Arial, sans-serif;
      display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
      letter-spacing: -0.022em;
    }
    .container {
      background: #ffffff; border: 1px solid var(--line);
      border-radius: 28px; padding: 40px; width: 100%; max-width: 500px; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    }
    h1 { font-size: 24px; font-weight: 700; color: var(--text); margin: 0 0 8px 0; }
    p.subtitle { color: var(--muted); margin-bottom: 30px; font-size: 13px; font-weight: 400; }
    
    /* 頂級純白膠囊切換鈕 */
    .role-selector { 
      display: flex; background: var(--card-bg); border-radius: 50px; padding: 4px; margin-bottom: 30px; 
      border: 1px solid rgba(0,0,0,0.02);
    }
    .role-btn { 
      flex: 1; background: transparent; color: var(--muted); border: none; padding: 12px; 
      font-size: 14px; font-weight: 600; border-radius: 50px; cursor: pointer; transition: all 0.2s;
    }
    .role-btn.active { background: #fff; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    
    /* Apple 原生黑色按鈕 */
    .btn-generate {
      background: #1d1d1f; color: #fff; border: none; padding: 16px; font-size: 16px; 
      font-weight: 500; border-radius: 50px; cursor: pointer; width: 100%; transition: background 0.2s;
    }
    .btn-generate:hover { background: var(--blue); }
    
    .output-box {
      background: var(--card-bg); border-radius: 18px; padding: 25px; margin-top: 30px; min-height: 120px;
      text-align: left; white-space: pre-line; line-height: 1.6; border: 1px solid rgba(0,0,0,0.02); 
      font-size: 15px; display: none; color: var(--text);
    }
    .btn-copy {
      background: transparent; color: var(--blue); border: none; padding: 12px; font-size: 14px; 
      font-weight: 500; cursor: pointer; margin-top: 15px; display: none; width: 100%; text-align: center;
    }
    .btn-copy:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
    <h1>U-Life 健康事業系統</h1>
    <p class="subtitle">🚀 智慧文案全自動生成矩陣</p>
    
    <div class="role-selector">
        <button class="role-btn active" id="btn-coach" onclick="setRole('coach')">🏋️ 運動教練</button>
        <button class="role-btn" id="btn-shop" onclick="setRole('shop')">💈 蒸足店長</button>
    </div>
    
    <button class="btn-generate" id="mainBtn" onclick="generatePerfectCopy()">🎯 一鍵生成今日爆款文案</button>
    
    <div class="output-box" id="outputBox"></div>
    <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">📋 一鍵複製文案</button>
</div>

<script>
let currentRole = 'coach';

function setRole(role) {
    currentRole = role;
    document.getElementById('btn-coach').classList.remove('active');
    document.getElementById('btn-shop').classList.remove('active');
    document.getElementById(role === 'coach' ? 'btn-coach' : 'btn-shop').classList.add('active');
    document.getElementById('outputBox').style.display = 'none';
    document.getElementById('copyBtn').style.display = 'none';
}

// 深度擴充的超級隨機矩陣庫（包含所有技術與細節，交叉組合可達數百篇不重複）

            "【階梯有氧】則是不用動腦的傻瓜燃脂王。節奏抓起來、步伐踩下去，一整堂課下來大汗淋漓，你連煩惱明天工作的心情都沒有，爽快度直接爆表！"
        ],
        insights: [
            "在我們 U-Life 系統裡，我們始終堅信：『三分練、七分吃』。單純盲目流汗是不夠的，真正的改變是連同你的飲食與身體能量一起管理。配合專屬的草本營養回補，讓你在大汗淋漓的同時，給予身體最純淨的修復。",
            "很多人以為運動一定要練到痛苦才有效。其實，能讓你快樂堅持下去的運動，才是最頂級的燃脂計畫。在這裡，沒有嚴厲的催促，只有陪伴你突破極限、重新找回輕盈體態的熱血氛圍！"

            "⚡ 給自己一個流程的時間，把累積一整週的寒氣全部甩掉。\n👉 立刻私訊小編【我要預約】，搶訂本週末黃金技術體驗時段，額滿只能等下週囉！"

};

function generatePerfectCopy() {
    const source = matrix[currentRole];
    
    // 全自動高階隨機洗牌演算法
    const randomHook = source.hooks[Math.floor(Math.random() * source.hooks.length)];
    const randomStory = source.stories[Math.floor(Math.random() * source.stories.length)];
    const randomInsight = source.insights[Math.floor(Math.random() * source.insights.length)];
    const randomCta = source.ctas[Math.floor(Math.random() * source.ctas.length)];
    
    const finalCopy = `${randomHook}\n\n${randomStory}\n\n${randomInsight}\n\n${randomCta}`;
    
    const outputBox = document.getElementById('outputBox');
    const copyBtn = document.getElementById('copyBtn');
    
    outputBox.innerText = finalCopy;
    outputBox.style.display = 'block';
    copyBtn.style.display = 'block';
    
    // 絲滑滾動到文案區
    outputBox.scrollIntoView({ behavior: 'smooth' });
}

function copyToClipboard() {
    const text = document.getElementById('outputBox').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert('爆款文案已複製！直接去社群發文吧 🚀');
    });
}
</script>

</body>
</html>
